services:
  - type: web
    name: ai-doc-assistant-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: /var/data/documents.db
      - key: DATA_DIR
        value: /var/data
      - key: FRONTEND_URL
        value: https://ai-doc-assistant-web.onrender.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disks:
      - name: ai-doc-assistant-disk
        mountPath: /var/data
        sizeGB: 1

  - type: static_site
    name: ai-doc-assistant-web
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .